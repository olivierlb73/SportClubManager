name: sport-club-manager CI workflow

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET 10.x
        uses: actions/setup-dotnet@v4
        with:
            dotnet-version: '10.x'
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Test with the dotnet CLI
        run: dotnet test --no-build
      - name: Publish App to Docker
        run: dotnet publish --os linux --arch x64 /t:PublishContainer
      - name: Run App in Docker
        run: docker run --name sportclubmanager -p 8080:8080 sportclubmanager
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run : cd Tests/e2e
      - run: npm install cypress --save-dev
      - run: npx cypress run
